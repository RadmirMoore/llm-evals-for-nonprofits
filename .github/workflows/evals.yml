name: evals

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evals:
    name: Run evals (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint the eval JSON (must be valid)
        run: |
          python3 -c "import json, glob; [json.load(open(f)) for f in glob.glob('evals/*.json')]; print('all eval JSON valid')"

      - name: Gate on GOOD responses (must be 100% pass)
        run: python3 src/run_eval.py --responses good --fail-under 1.0 --no-color

      - name: Unit + invariant tests (good all pass, bad all fail)
        run: python -m pytest -q

      - name: Publish pass/fail tables to the job summary
        if: always() && matrix.python-version == '3.12'
        run: |
          {
            echo '## Eval results'
            echo ''
            echo '```'
            python3 src/run_eval.py --responses both --no-color
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
