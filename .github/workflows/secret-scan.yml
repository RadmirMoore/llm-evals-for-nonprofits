name: secret-scan

# Belt-and-suspenders against a committed API key: gitleaks scans every push and
# PR (full history) for secrets. `.env` is gitignored, but this catches the case
# where someone force-adds it or pastes a key into a tracked file by mistake.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
